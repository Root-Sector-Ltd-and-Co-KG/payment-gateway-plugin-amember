name: phpreleaser

on:
  pull_request:
  push:
    tags:
      - "*"

jobs:
  phpreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Print Release Version
        run: echo Release version is ${{ github.ref_name }}

      - name: Create Subfolder
        run: mkdir -p payment-gateway-app && find . -maxdepth 1 -type f -exec mv {} payment-gateway-app/ \; && find . -maxdepth 1 -type d ! -name payment-gateway-app ! -name . -exec mv {} payment-gateway-app/ \; && rm -rf payment-gateway-app/.git* payment-gateway-app/.github

      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          filename: payment-gateway-app_v${{ github.ref_name }}.zip
          exclusions: "payment-gateway-app/RELEASE.md *.git* *.github*"

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: payment-gateway-app_v${{ github.ref_name }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
