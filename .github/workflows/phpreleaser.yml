name: phpreleaser

# Grant GITHUB_TOKEN the rights it needs
permissions:
  contents: write # gives access to create Releases via the REST API
  issues: write # optional, if you want to comment on PRs/issues
  pull-requests: write # optional, same
  packages: write # optional, if you publish packages

on:
  pull_request:
  push:
    tags:
      - "**"

jobs:
  phpreleaser:
    runs-on: ubuntu-latest
    env:
      PLUGIN_RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PHP syntax
        run: |
          find . -name '*.php' -print0 | xargs -0 -n1 php -l
          php tests/customer-risk-hold.test.php
          php tests/plugin-load.test.php
          php tests/release-workflow.test.php

      - name: Prepare release metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: php scripts/prepare-release.php "$PLUGIN_RELEASE_VERSION"

      - name: Print Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo Release version is ${{ github.ref_name }}

      - name: Create Subfolder
        if: startsWith(github.ref, 'refs/tags/')
        run: mkdir -p payment-gateway-app && find . -maxdepth 1 -type f -exec mv {} payment-gateway-app/ \; && find . -maxdepth 1 -type d ! -name payment-gateway-app ! -name . -exec mv {} payment-gateway-app/ \; && rm -rf payment-gateway-app/.git* payment-gateway-app/.github

      - name: Archive Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          filename: payment-gateway-app_v${{ env.PLUGIN_RELEASE_VERSION }}.zip
          exclusions: "payment-gateway-app/RELEASE.md payment-gateway-app/scripts/* payment-gateway-app/tests/* *.git* *.github*"

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: payment-gateway-app_v${{ env.PLUGIN_RELEASE_VERSION }}.zip
          bodyFile: payment-gateway-app/RELEASE.md
          token: ${{ secrets.GITHUB_TOKEN }}
